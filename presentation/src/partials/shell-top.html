<script>(function(){
  var el=document.getElementById('bootTerm'); if(!el) return;
  var en=document.documentElement.getAttribute('data-lang')==='en';
  var line='Sylanne: hello world!';
  var ci=0;
  function step(){
    if(ci<=line.length){
      el.textContent='$ '+line.slice(0,ci)+'▍';
      ci++; setTimeout(step, ci===1?80:10);    // 极快：逐字 10ms
    } else { window.__bootDone=true; }          // 打完置标志
  }
  step();
})();</script>
