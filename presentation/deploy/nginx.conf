# 容器内 nginx — 只发静态文件，gzip + 长缓存（2c2g 省带宽）
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip：文本资源压缩
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/html text/css application/javascript application/json image/svg+xml font/woff2 model/gltf-binary application/octet-stream;
    gzip_vary on;

    # 字体 / 模型 / 图片：长缓存
    location ~* \.(woff2|woff|ttf|glb|png|jpg|jpeg|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    # css/js：带缓存但较短（改版后能更新）
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    # index.html：不缓存，保证改版即时生效
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    # 证书商域名验证文件（.well-known/pki-validation 与 acme-challenge）——纯文本、不缓存、必须真实命中
    location ^~ /.well-known/ {
        root /usr/share/nginx/html;
        default_type "text/plain";
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }
    # SPA hash 路由（#/engine），直接发 index 即可
    location / {
        try_files $uri $uri/ /index.html;
    }
}
