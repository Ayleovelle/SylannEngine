name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag（例如 v2.4.0），留空则用触发时的 ref'
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Resolve ref to build
        id: ref
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::error::手动触发(workflow_dispatch)必须填写 tag 输入，例如 v2.4.0"
            exit 1
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag / pyproject / __init__ version consistency
        run: |
          TAG="${{ steps.ref.outputs.ref }}"
          TAG="${TAG#refs/tags/}"
          TAG_VERSION="${TAG#v}"

          PYPROJECT_VERSION=$(python3 -c "import re; print(re.search(r'(?m)^version\s*=\s*\"(.+?)\"', open('pyproject.toml').read()).group(1))")
          INIT_VERSION=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('sylanne_core/__init__.py').read()).group(1))")

          echo "tag version:       $TAG_VERSION"
          echo "pyproject version: $PYPROJECT_VERSION"
          echo "__init__ version:  $INIT_VERSION"

          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ] || [ "$TAG_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::版本号不一致 — tag=$TAG_VERSION pyproject=$PYPROJECT_VERSION __init__=$INIT_VERSION"
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: twine check
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
