name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: get_version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('sylanne_core/__init__.py').read()).group(1))")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: v${VERSION}"

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view ${{ steps.get_version.outputs.version }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract changelog for version
        if: steps.check_release.outputs.exists == 'false'
        id: get_changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          cat > extract_changelog.py << 'PYTHON_SCRIPT'
          import re
          import sys

          version = sys.argv[1]

          try:
              with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
                  content = f.read()
          except FileNotFoundError:
              print('修复了一些已知问题')
              sys.exit(0)

          pattern = rf'## \[{re.escape(version)}\]\s*-\s*\d{{4}}-\d{{2}}-\d{{2}}\s*\n(.*?)(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)

          if match:
              changelog = match.group(1).strip()
              print(changelog if changelog else '修复了一些已知问题')
          else:
              print('修复了一些已知问题')
          PYTHON_SCRIPT

          python3 extract_changelog.py "$VERSION" > changelog_output.txt
          CHANGELOG=$(cat changelog_output.txt)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="修复了一些已知问题"
          fi

          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          rm -f extract_changelog.py changelog_output.txt

      - name: Build zip package
        if: steps.check_release.outputs.exists == 'false'
        run: |
          set -euo pipefail

          PACKAGE_NAME="sylannengine"
          VERSION="${{ steps.get_version.outputs.version }}"
          BUILD_ROOT="${RUNNER_TEMP}/sdk-build"
          STAGE_DIR="${BUILD_ROOT}/${PACKAGE_NAME}"
          ZIP_NAME="${PACKAGE_NAME}-${VERSION}.zip"

          rm -rf "${BUILD_ROOT}"
          mkdir -p "${STAGE_DIR}"
          mkdir -p "${GITHUB_WORKSPACE}/dist"

          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.idea/' \
            --exclude '.vscode/' \
            --exclude '.pytest_cache/' \
            --exclude '.ruff_cache/' \
            --exclude '.mypy_cache/' \
            --exclude '.cache/' \
            --exclude '.venv/' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude 'dist/' \
            --exclude 'build/' \
            --exclude '*.pyc' \
            --exclude '*.pyo' \
            --exclude '.DS_Store' \
            ./ "${STAGE_DIR}/"

          cd "${BUILD_ROOT}"
          zip -r "${GITHUB_WORKSPACE}/dist/${ZIP_NAME}" "${PACKAGE_NAME}"

      - name: Upload zip artifact
        if: steps.check_release.outputs.exists == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: sdk-zip-${{ steps.get_version.outputs.version }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: ${{ steps.get_version.outputs.version }}
          body: ${{ steps.get_changelog.outputs.changelog }}
          files: dist/*.zip
          prerelease: ${{ contains(steps.get_version.outputs.version, 'preview') || contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'beta') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
