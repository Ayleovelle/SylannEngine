name: Sync SDK Branch

on:
  push:
    branches: [main]
    paths:
      - 'sylanne_core/**'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'README.md'
      - 'docs/**'
      - 'schemas/**'
      - 'tests/**'

permissions:
  contents: write

jobs:
  sync-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build SDK branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create orphan or checkout existing sdk branch
          git checkout sdk 2>/dev/null || git checkout --orphan sdk

          # Reset to main content
          git checkout main -- .

          # Remove plugin-only files
          rm -f main.py metadata.yaml

          # Stage and commit
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "sync: mirror main ($(git log main -1 --format='%h %s'))"
            git push origin sdk --force
          fi
