changelog:
  exclude:
    labels:
      - dependencies
      - github_actions
    authors:
      - dependabot
  categories:
    - title: "✨ New Features"
      labels:
        - type/feat
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - type/fix
        - bug
    - title: "📚 Documentation"
      labels:
        - type/docs
        - documentation
    - title: "🎨 Design & UX"
      labels:
        - type/design
    - title: "🔧 Maintenance"
      labels:
        - type/chore
    - title: "Other Changes"
      labels:
        - "*"
