name: '❓ 使用咨询 / 问题讨论'
description: 提交咨询、排查思路或开放性讨论。
title: '[Discussion] '
labels: [ 'type/discussion' ]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间发起讨论！如果您暂时不能确定这是否是 Bug，或者希望先进行使用咨询、集成排查、方案讨论，都可以使用该模板。

  - type: textarea
    attributes:
      label: 你想实现什么？
      description: 请描述你的目标、预期效果，或你当前想确认的问题。
      placeholder: >
        如: 我希望根据 surface 的 decision 调整回复策略，但不确定某个字段的语义是否符合预期。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 当前实际情况
      description: 请描述你目前观察到的现象、输出结果或不符合预期的行为。
      placeholder: >
        如: process() 已正常返回，但 action 始终为 hold，不确定是输入还是配置导致。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 你已经尝试过哪些方法？
      description: 请简要说明你已经做过的排查、对照或临时处理方式。
      placeholder: >
        如: 已对照 SPEC / AGENT_GUIDE、打印中间状态、切换档位、检查 LLM 回调返回值。
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 你目前对问题性质的判断
      description: 这有助于我们更快判断后续应继续讨论、补文档，还是转为 Bug。
      options:
        - '不确定，想先确认是否为预期行为'
        - '可能是 Bug，但还不能确定'
        - '更像是集成或配置相关问题'
        - '更像是使用方式或文档理解问题'
    validations:
      required: true

  - type: input
    attributes:
      label: SylannEngine 版本
      description: 请填写你当前使用的 sylanne_core 版本。
      placeholder: '如: 2.0.0'
    validations:
      required: true

  - type: input
    attributes:
      label: Python 版本
      description: 请填写你的 Python 版本。
      placeholder: '如: 3.12.3'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 操作系统
      description: 你当前主要运行在什么操作系统上？
      options:
        - 'Windows'
        - 'macOS'
        - 'Linux'
        - 'Other'
        - 'Not sure'
    validations:
      required: true

  - type: textarea
    attributes:
      label: 补充说明（可选）
      description: 如涉及特定运行环境、依赖版本或集成方式，请在这里补充。
      placeholder: >
        如: 运行在 asyncio 多任务环境；numpy 2.1；通过 submodule 引入等。

  - type: textarea
    attributes:
      label: 相关配置、日志或截图
      description: 如相关配置片段、控制台输出、截图等。涉及隐私信息时请先脱敏。
      placeholder: >
        请尽量提供能帮助定位问题的配置、日志或截图。

  - type: checkboxes
    attributes:
      label: 你愿意在结论明确后提交 PR 或协助补充文档吗？
      description: 这不是必需的，但如果你愿意参与后续修复或补充说明，会非常有帮助。
      options:
        - label: 是的，我愿意在问题明确后协助推进。

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: >
            我已阅读并同意遵守该项目的 [行为准则](https://docs.github.com/zh/site-policy/github-terms/github-community-code-of-conduct)。
          required: true

  - type: markdown
    attributes:
      value: '感谢您填写我们的表单！'
