name: '🐛 报告 Bug'
description: 提交报告帮助我们改进。
title: '[Bug] '
labels: [ 'type/fix' ]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间报告问题！请准确解释您的问题。如果可能，请提供一个可复现的片段（这有助于更快地解决问题）。

  - type: textarea
    attributes:
      label: 发生了什么
      description: 描述你遇到的异常。
      placeholder: >
        一个清晰且具体的描述这个异常是什么。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 如何复现？
      description: 复现该问题的步骤，最好能附上一个最小可复现代码片段。
      placeholder: >
        如: 1. 用如下参数实例化 SylanneEngine ... 2. 调用 process(...) ... 3. 观察到 ...
    validations:
      required: true

  - type: input
    attributes:
      label: SylannEngine 版本
      description: 请填写你当前使用的 sylanne_core 版本（见 __version__ 或 pyproject）。
      placeholder: '如: 2.0.0'
    validations:
      required: true

  - type: input
    attributes:
      label: Python 版本
      description: 请填写你的 Python 版本。
      placeholder: '如: 3.12.3'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 计算档位
      description: 你使用的是哪个档位（tier）？
      options:
        - 'lite'
        - 'pro'
        - 'max'
        - '不确定 / 默认'
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 操作系统
      description: 你在哪个操作系统上遇到了这个问题？
      options:
        - 'Windows'
        - 'macOS'
        - 'Linux'
        - 'Other'
        - 'Not sure'
    validations:
      required: true

  - type: textarea
    attributes:
      label: 补充说明（可选）
      description: 如涉及特定运行环境、依赖版本（numpy / torch）或集成方式，请在这里补充。
      placeholder: >
        如: 运行在 asyncio 多任务环境；numpy 2.1；通过 submodule 引入等。

  - type: textarea
    attributes:
      label: 报错日志
      description: 如报错日志、堆栈、截图等。请提供完整的日志，不要介意它很长！
      placeholder: >
        请提供完整的报错日志或截图。
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: 你愿意提交 PR 吗？
      description: 这不是必需的，但我们很乐意在贡献过程中为您提供指导，特别是如果你已经很好地理解了如何实现修复。
      options:
        - label: 是的，我愿意提交 PR!

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: >
            我已阅读并同意遵守该项目的 [行为准则](https://docs.github.com/zh/site-policy/github-terms/github-community-code-of-conduct)。
          required: true

  - type: markdown
    attributes:
      value: '感谢您填写我们的表单！'
