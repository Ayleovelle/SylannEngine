name: '🎉 功能建议'
description: 提交建议帮助我们改进。
title: '[Feature] '
labels: [ 'type/feat' ]
body:
  - type: markdown
    attributes:
      value: |
        感谢您抽出时间提出新功能建议，请准确解释您的想法。

  - type: textarea
    attributes:
      label: 描述
      description: 简短描述您的功能建议。
      placeholder: >
        请简要说明你希望新增、改进或调整的功能。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 使用场景
      description: 你想要发生什么？
      placeholder: >
        一个清晰且具体的描述这个功能的使用场景。
    validations:
      required: true

  - type: dropdown
    attributes:
      label: 该建议主要涉及哪个部分？
      description: 请选择最相关的一项。
      options:
        - '计算核心（共振场 / 管线）'
        - '人格 / 漂移系统'
        - '决策 / 边界守卫'
        - 'API / 接口'
        - '性能 / 档位'
        - '文档'
        - '其他'
    validations:
      required: true

  - type: textarea
    attributes:
      label: 补充说明（可选）
      description: >
        如该建议与特定运行环境、依赖版本或集成方式有关，请在这里补充。
      placeholder: >
        如: 希望在 max 档下支持 GPU 批处理；建议优先支持 XX 功能等。

  - type: checkboxes
    attributes:
      label: 你愿意提交 PR 吗?
      description: >
        这不是必须的，但我们欢迎您的贡献。
      options:
        - label: 是的, 我愿意提交PR!

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: >
            我已阅读并同意遵守该项目的 [行为准则](https://docs.github.com/zh/site-policy/github-terms/github-community-code-of-conduct)。
          required: true

  - type: markdown
    attributes:
      value: '感谢您填写我们的表单！'
